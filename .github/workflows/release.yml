name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - id: version
        name: Resolve and validate release source
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: >-
          node scripts/resolve-release-source.mjs
          --event ${{ github.event_name }}
          --event-sha ${{ github.sha }}
          --tag "$RELEASE_TAG"
          --output "$GITHUB_OUTPUT"

  test-gate:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Run and record Legacy release test gate
        run: node scripts/run-and-record.mjs --out release-evidence/test/test-gate.log -- npm run release:test-gate
      - name: Create test evidence manifest
        run: >-
          node scripts/release-evidence.mjs create-test
          --commit ${{ needs.prepare.outputs.sha }}
          --lockfile package-lock.json
          --evidence-root dist
          --out dist/release-evidence/test/test-gate.manifest.json
          --log release-evidence/test/test-gate.log
      - name: Upload release test evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-test-evidence
          path: dist/release-evidence/test/*
          if-no-files-found: error

  build:
    name: ${{ matrix.name }}
    needs: [prepare, test-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            args: --linux --x64
            name: linux-amd64
          - runner: ubuntu-24.04-arm
            args: --linux --arm64
            name: linux-arm64
          - runner: macos-15-intel
            args: --mac --x64
            name: macos-amd64
          - runner: macos-15
            args: --mac --arm64
            name: macos-arm64
          - runner: windows-2025
            args: --win --x64
            name: windows-amd64
          - runner: windows-11-arm
            args: --win --arm64
            name: windows-arm64
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      runner: ${{ matrix.runner }}
      builder-args: ${{ matrix.args }}
      smoke-unpacked: true
      include-release-evidence: true
      release-version: ${{ needs.prepare.outputs.version }}
      upload-artifact: true
      artifact-name: ${{ matrix.name }}

  publish:
    needs: [prepare, test-gate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-amd64
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-arm64
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-amd64
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-arm64
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-amd64
          path: dist
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-arm64
          path: dist

      - name: Verify evidence chain and create Legacy release report
        run: >-
          node scripts/release-evidence.mjs verify
          --root dist
          --commit ${{ needs.prepare.outputs.sha }}
          --lockfile package-lock.json
          --report dist/legacy-release-report.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: ${{ needs.prepare.outputs.tag }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          files: |
            dist/*.exe
            dist/*.deb
            dist/*.AppImage
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
            dist/legacy-release-report.json
            dist/release-evidence/**/*.manifest.json
            dist/release-evidence/**/*.log
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          generate_release_notes: true
