name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          SHA="$(git rev-list -n 1 "$TAG")"
          if [ -z "$SHA" ]; then
            echo "Could not resolve commit for tag: $TAG" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  test-gate:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_VERSION: '22'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:control-plane
      - run: npm run check:control-plane-types
      - run: npm run check:legacy-write-guard
      - run: npm run lint
      - run: npm run test:fast
      - run: npm run test:control-plane

  build:
    needs: [prepare, test-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            args: --linux
            name: linux-x64
          - runner: macos-latest
            args: --mac
            name: macos-arm64
          - runner: windows-latest
            args: --win
            name: windows-x64
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      runner: ${{ matrix.runner }}
      builder-args: ${{ matrix.args }}
      upload-artifact: true
      artifact-name: ${{ matrix.name }}

  publish:
    needs: [prepare, test-gate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@ccfa4c90b373a1bba1453ddebf4731d659dd3955 # v4.1.9
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@0508763985e9303a802fc2637ea176567cb4f220 # v2.2.1
        with:
          name: ${{ needs.prepare.outputs.tag }}
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
