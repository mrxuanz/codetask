name: Sandbox

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/sandbox.yml'
      - 'native/**'
      - 'src/server/sandbox/**'
      - 'src/sandbox/**'
      - 'tests/sandbox/**'
  pull_request:
    branches: [main, master]
    paths:
      - '.github/workflows/sandbox.yml'
      - 'native/**'
      - 'src/server/sandbox/**'
      - 'src/sandbox/**'
      - 'tests/sandbox/**'

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          # Ubuntu 24.04+ AppArmor blocks unprivileged userns required by bwrap.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: native
      - run: cargo test --manifest-path native/Cargo.toml --no-fail-fast -- --test-threads=1
      - run: cargo test --manifest-path native/Cargo.toml --release --no-fail-fast -- --test-threads=1

  escape-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          # Ubuntu 24.04+ AppArmor blocks unprivileged userns required by bwrap.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: native
      - run: npm ci
      - run: npm run build:sandbox:debug
      - run: npm run test:sandbox:all
