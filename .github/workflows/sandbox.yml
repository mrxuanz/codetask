name: Sandbox

on:
  push:
    paths:
      - 'native/**'
      - 'src/server/sandbox/**'
      - 'tests/sandbox/**'
      - 'package.json'
      - '.github/workflows/sandbox.yml'
  pull_request:
    paths:
      - 'native/**'
      - 'src/server/sandbox/**'
      - 'tests/sandbox/**'
      - 'package.json'
      - '.github/workflows/sandbox.yml'

jobs:
  rust:
    name: Rust unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Adapter + sandbox crate tests
        run: |
          cd native
          cargo test -p codeteam-sandbox-adapter
          cargo test -p codeteam-sandbox attestation

  node-typecheck:
    name: Node typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
