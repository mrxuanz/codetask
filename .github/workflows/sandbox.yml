name: Sandbox

on:
  push:
    branches: [main, master]
    paths:
      - 'native/**'
      - 'src/server/sandbox/**'
      - 'src/sandbox/**'
      - 'tests/sandbox/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'native/**'
      - 'src/server/sandbox/**'
      - 'src/sandbox/**'
      - 'tests/sandbox/**'

env:
  NODE_VERSION: '22'

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          # Ubuntu 24.04+ AppArmor blocks unprivileged userns required by bwrap.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Cache Rust
        uses: Swatinem/rust-cache@3c2a84e9cad3969901890dbc98083c3ad8e21e6d # v2.7.7
        with:
          workspaces: native
      - run: cargo test --manifest-path native/Cargo.toml
      - run: cargo test --manifest-path native/Cargo.toml --release

  escape-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          # Ubuntu 24.04+ AppArmor blocks unprivileged userns required by bwrap.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Cache Rust
        uses: Swatinem/rust-cache@3c2a84e9cad3969901890dbc98083c3ad8e21e6d # v2.7.7
        with:
          workspaces: native
      - run: npm ci
      - run: npm run build:sandbox:debug
      - run: npm run test:sandbox:all
