name: Build (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner OS (ubuntu-latest / macos-latest / windows-latest)'
        required: true
        type: string
      builder-args:
        description: 'electron-builder CLI args (--win / --mac / --linux)'
        required: true
        type: string
      upload-artifact:
        description: 'Whether to upload the build artifact'
        required: false
        default: false
        type: boolean
      artifact-name:
        description: 'Artifact name for upload'
        required: false
        default: 'package'
        type: string

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Cache Rust
        uses: Swatinem/rust-cache@3c2a84e9cad3969901890dbc98083c3ad8e21e6d # v2.7.7
        with:
          workspaces: native

      - run: npm ci

      - name: Build sandbox (native)
        run: npm run build:sandbox

      - name: Build app
        run: npm run build

      - name: Package ${{ inputs.builder-args }}
        # --publish never: packaging only; Release workflow publishes via softprops/action-gh-release
        run: node scripts/electron-mirror-env.mjs electron-builder ${{ inputs.builder-args }} --publish never

      - if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@65c4c08a768d7e4a08fabdd5333d057d994bc549 # v4.6.0
        with:
          name: ${{ inputs.artifact-name }}
          # upload-artifact does not expand bash brace globs; list patterns explicitly
          path: |
            dist/*.exe
            dist/*.deb
            dist/*.AppImage
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
