name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm run typecheck:control-plane:ci
      - run: npm run check:control-plane-types
      - run: npm run check:legacy-write-guard
      - run: npm run check:no-double-assertions

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:fast
      - run: npm run test:control-plane

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          # Ubuntu 24.04+ AppArmor blocks unprivileged userns required by bwrap.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: native
      - run: npm ci
      - name: Rust tests
        run: cargo test --manifest-path native/Cargo.toml
      - name: Rust build check
        run: cargo check --manifest-path native/Cargo.toml --release

  package-smoke:
    needs: [quality, test]
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ github.sha }}
      runner: ubuntu-latest
      builder-args: --linux
      smoke-unpacked: true
      upload-artifact: false
