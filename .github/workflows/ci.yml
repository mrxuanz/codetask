name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:control-plane
      - run: npm run check:control-plane-types
      - run: npm run check:legacy-write-guard

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:fast
      - run: npm run test:control-plane

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install bubblewrap
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          # Ubuntu 24.04+ AppArmor blocks unprivileged userns required by bwrap.
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Cache Rust
        uses: Swatinem/rust-cache@3c2a84e9cad3969901890dbc98083c3ad8e21e6d # v2.7.7
        with:
          workspaces: native
      - run: npm ci
      - name: Rust tests
        run: cargo test --manifest-path native/Cargo.toml
      - name: Rust build check
        run: cargo check --manifest-path native/Cargo.toml --release

  package-smoke:
    needs: [quality, test]
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ github.sha }}
      runner: ubuntu-latest
      builder-args: --linux --dir
      upload-artifact: false
