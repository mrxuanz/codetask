name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:fast

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native
      - run: npm ci
      - name: Rust tests
        run: cargo test --manifest-path native/Cargo.toml
      - name: Rust build check
        run: cargo check --manifest-path native/Cargo.toml --release

  package-smoke:
    needs: [quality, test]
    uses: ./.github/workflows/build.yml
    with:
      runner: ubuntu-latest
      builder-args: --linux --dir
      upload-artifact: false
